name: test-molonari

on:
  # Activate the workflow at each push on every branch
  push:
    branches:
      - "*"
  # Activate the workflow at each pull request on "main" branch
  pull_request:
    branches: [ main ]

jobs:
  test-job:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        pyver: ["3.9", "3.10", "3.11", "3.12"]
        module: ["pyheatmy", "Molonaviz"]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4

    - name: Install the latest version of rye
      uses: eifinger/setup-rye@v4
      with:
        enable-cache: true

    - name: Sync dependencies
      run: |
        rye pin ${{ matrix.pyver }}
        rye sync

    - name: Install dev dependencies
      run: rye add pytest nbmake

    - name: Test ${{ matrix.module }}
      run: rye run pytest ${{ matrix.module }}

    - name: Test Jupyter Notebooks
      if: matrix.module == 'pyheatmy'
      run: |
        rye run pytest --nbmake --nbmake-timeout=600 \
          pyheatmy/pyheatmy/DREAM_v1.ipynb \
          pyheatmy/research/synthetic_cases_generator/demo_genData.ipynb
      shell: bash
